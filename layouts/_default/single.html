{{ define "main" }}
<article>
  <a href="/" class="back-link">← Journal</a>
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-meta">{{ .Date.Format "January 2, 2006" }}</div>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
