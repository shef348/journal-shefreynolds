{{ define "main" }}
<article>
  <a href="/" class="back-link">← Journal</a>
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <div class="post-meta">{{ .Date.Format "January 2, 2006" }}</div>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>

<nav class="post-nav">
  {{ with .PrevInSection }}
    <a href="{{ .Permalink }}" class="post-nav-link post-nav-prev">
      <span class="post-nav-label">← Older</span>
      <span class="post-nav-title">{{ .Title }}</span>
    </a>
  {{ else }}
    <span></span>
  {{ end }}
  {{ with .NextInSection }}
    <a href="{{ .Permalink }}" class="post-nav-link post-nav-next">
      <span class="post-nav-label">Newer →</span>
      <span class="post-nav-title">{{ .Title }}</span>
    </a>
  {{ else }}
    <span></span>
  {{ end }}
</nav>
{{ end }}
